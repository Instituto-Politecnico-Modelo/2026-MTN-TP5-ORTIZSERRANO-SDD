spring.application.name=OrtizSerranoTP3

# Base de datos H2 en memoria (desarrollo)
spring.datasource.url=jdbc:h2:mem:decanato_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL (descomentar y completar contraseña cuando esté disponible)
# spring.datasource.url=jdbc:mysql://localhost:3306/decanato_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=TU_PASSWORD

# Puerto del servidor
server.port=8080

# Configuración JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A
jwt.expiration=86400000

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ──────────────────────────────────────────────────────────────────────────────
# Configuración de Filas Virtuales + Rate Limiter (Issue #26)
# ──────────────────────────────────────────────────────────────────────────────

# Rate Limiter: máximo de intentos de inscripción por usuario por ventana
inscripcion.ratelimit.max-intentos=5
inscripcion.ratelimit.ventana-segundos=60

# Semáforo por materia: máximo de transacciones DB concurrentes
# permits=1 garantiza serialización completa → evita sobrecupos bajo race conditions
inscripcion.semaforo.permisos=1
inscripcion.semaforo.timeout-ms=10000

# Cola virtual: horas que dura un turno antes de expirar
cola.expiracion.horas=48

# Tarea de limpieza de turnos expirados (en milisegundos, default 60s)
cola.limpieza.delay-ms=60000

# ──────────────────────────────────────────────────────────────────────────────
# Metadatos de la aplicación (usados en emails)
# ──────────────────────────────────────────────────────────────────────────────
app.nombre=Sistema de Decanato IPM
app.url=http://localhost:5173

