# Configuración de Logging para Debugging
# Nivel de logging general
logging.level.root=INFO

# Logging detallado para tu aplicación
logging.level.com.DecanatoOrtizSerrano.OrtizSerranoTP3=DEBUG

# Logging de Spring Framework
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data=DEBUG

# Logging de Hibernate/JPA
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type=TRACE
logging.level.org.hibernate.engine.QueryParameters=DEBUG
logging.level.org.hibernate.engine.query.HQLQueryPlan=DEBUG

# Mostrar valores de parámetros SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging de transacciones
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG

# Logging de excepciones completas
server.error.include-exception=true
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# Logging a archivo
logging.file.name=logs/application-debug.log
logging.file.path=logs
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} - %msg%n

# Rotación de logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# Debugging de MVC
spring.mvc.log-request-details=true
spring.mvc.log-resolved-exception=true

# DevTools (auto-reload durante desarrollo)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Mostrar banner de Spring Boot
spring.main.banner-mode=console
