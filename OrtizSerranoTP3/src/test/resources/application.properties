# ──────────────────────────────────────────────────────────────────────────────
# Configuración para tests — usa H2 en memoria (no requiere MySQL)
# ──────────────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:decanato_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

spring.h2.console.enabled=false

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Rate limiter / cola / semáforo
inscripcion.ratelimit.max-intentos=5
inscripcion.ratelimit.ventana-segundos=60
inscripcion.semaforo.permisos=1
inscripcion.semaforo.timeout-ms=10000
cola.expiracion.horas=48
cola.limpieza.delay-ms=60000

# App
app.nombre=Sistema de Decanato IPM
app.url=http://localhost:5173
